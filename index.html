<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breja Family Tree</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1A1A1A;
      --surface: #1A1A1A;
      --gold: #C9A84C;
      --gold-dim: rgba(201,165,74,0.5);
      --gold-faint: rgba(201,165,74,0.13);
      --parchment: #F7F3EC;
      --ink: #4A5060;
      --forest: #2D5A4F;
      --sand: #E8DCC8;
      --border: rgba(201,165,74,0.22);
      --hdr: 58px;
      --nw: 170px;
      --nh: 92px;
    }

    body {
      background: var(--bg);
      color: var(--parchment);
      font-family: 'EB Garamond', Georgia, serif;
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--hdr);
      background: var(--surface);
      border-bottom: 1px solid var(--sand);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      z-index: 300;
    }
    .h-left { display:flex; align-items:baseline; gap:14px; }
    .h-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: var(--gold); letter-spacing: 0.05em;
    }
    .h-sep { width:1px; height:16px; background:var(--sand); }
    .h-sub {
      font-size:11px; color:var(--gold-dim);
      letter-spacing:0.2em; text-transform:uppercase;
    }
    .h-hint { font-size:12px; color:rgba(244,237,216,0.4); letter-spacing:0.03em; }

    #wrap {
      position:fixed; top:var(--hdr); left:0; right:0; bottom:0;
      overflow:hidden;
    }
    #tree-svg {
      width:100%; height:100%; display:block;
      cursor: grab;
    }
    #tree-svg.drag { cursor: grabbing; }

    #panel {
      position:fixed;
      top:calc(var(--hdr) + 14px); right:18px;
      width:280px;
      background:var(--surface);
      border:1px solid var(--sand);
      border-radius:14px;
      padding:24px 22px 26px;
      z-index:250;
      transform:translateX(310px);
      transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow:0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,165,74,0.1);
    }
    #panel.open { transform:translateX(0); }
    #panel-x {
      position:absolute; top:14px; right:16px;
      background:none; border:none;
      color:var(--gold-dim); font-size:24px; line-height:1;
      cursor:pointer; transition:color .2s;
    }
    #panel-x:hover { color:var(--gold); }
    .p-avatar {
      width:64px; height:64px; border-radius:50%;
      background:var(--gold-faint);
      border:2px solid var(--sand);
      display:flex; align-items:center; justify-content:center;
      font-family:'Playfair Display',serif;
      font-size:22px; color:var(--gold);
      margin:0 auto 16px;
      overflow:hidden;
    }
    .p-avatar img { width:100%; height:100%; object-fit:cover; }
    .p-name {
      font-family: 'Playfair Display',serif;
      font-size:18px; color:var(--parchment);
      text-align:center; margin-bottom:4px; line-height:1.3;
    }
    .p-role {
      font-size:11px; color:var(--gold-dim);
      text-align:center; letter-spacing:0.14em;
      text-transform:uppercase; margin-bottom:20px;
    }
    .p-hr { height:1px; background:var(--sand); margin-bottom:16px; opacity:0.6; }
    .p-row { display:flex; gap:12px; margin-bottom:10px; font-size:14px; }
    .p-lbl {
      font-size:11px; text-transform:uppercase;
      letter-spacing:0.12em; color:var(--gold-dim);
      min-width:56px; padding-top:2px;
    }
    .p-val { color:var(--parchment); }
    .p-note {
      font-style:italic; color:rgba(244,237,216,0.4);
      font-size:13.5px; text-align:center; line-height:1.7;
      margin-top:12px; padding-top:12px; border-top:1px solid var(--sand);
    }

    #ctrl {
      position:fixed; bottom:24px; right:24px;
      display:flex; flex-direction:column; gap:8px; z-index:200;
    }
    .cb {
      width:40px; height:40px;
      background:var(--surface); border:1px solid var(--sand);
      border-radius:10px; color:var(--gold); font-size:18px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .2s cubic-bezier(0.16,1,0.3,1);
      user-select:none;
    }
    .cb:hover { background:var(--forest); border-color:var(--gold); transform:translateY(-1px); }

    #legend {
      position:fixed; bottom:24px; left:24px;
      display:flex; flex-direction:column; gap:8px; z-index:200;
    }
    .lg { 
      display:flex; align-items:center; gap:12px; font-size:12px; color:var(--ink); 
      padding:8px 14px; background:var(--parchment); border-radius:8px; 
    }
    .lgsw { width:24px; height:14px; border-radius:4px; flex-shrink:0; border:1.5px solid var(--gold); }
  </style>
</head>
<body>

<header>
  <div class="h-left">
    <span class="h-title">Breja Family Tree</span>
    <div class="h-sep"></div>
    <span class="h-sub">Four Generations</span>
  </div>
  <span class="h-hint">Drag to pan · Scroll to zoom · Click to explore</span>
</header>

<div id="wrap">
  <svg id="tree-svg">
    <defs>
      <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
        <feGaussianBlur stdDeviation="6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.55)"/>
      </filter>
      <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
        <circle cx="14" cy="14" r="0.8" fill="rgba(201,165,74,0.07)"/>
      </pattern>
    </defs>
    <rect id="bg-fill" width="100%" height="100%" fill="var(--bg)"/>
    <rect id="bg-dots" width="100%" height="100%" fill="url(#dots)"/>
    <g id="tg">
      <g id="conn"></g>
      <g id="nd"></g>
    </g>
  </svg>
</div>

<div id="panel">
  <button id="panel-x" onclick="closePanel()">×</button>
  <div id="pbody"></div>
</div>

<div id="ctrl">
  <div class="cb" title="Zoom in" onclick="doZoom(1.18)">+</div>
  <div class="cb" title="Zoom out" onclick="doZoom(0.847)">−</div>
  <div class="cb" title="Fit view" onclick="resetView()" style="font-size:15px">⌂</div>
</div>

<div id="legend">
  <div class="lg"><div class="lgsw" style="background:var(--parchment);border-color:var(--gold);"></div> Living</div>
  <div class="lg"><div class="lgsw" style="background:var(--forest);"></div> Deceased</div>
  <div class="lg"><div class="lgsw" style="border:1.5px dashed var(--gold);background:transparent;"></div> To add</div>
</div>

<script>
const NS = 'http://www.w3.org/2000/svg';
const el = (tag, a = {}) => {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(a)) e.setAttribute(k, v);
  return e;
};

const PEOPLE = [
  {
    id: 'vishesh', role: 'Root',
    name: 'Vishesh Breja',
    born: {d:21, m:10, y:1993, place: 'Faridabad, Haryana'},
    status: 'living', isRoot: true, placeholder: false,
  },
  {
    id: 'niti', role: 'Spouse',
    name: 'Niti Breja',
    born: {d:10, m:7, y:1995, place: 'Faridabad, Haryana'},
    status: 'living', placeholder: false,
  },
  { id: 'father', role: 'Father', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'mother', role: 'Mother', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'sib1', role: 'Sibling', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'sib2', role: 'Sibling', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'patGF', role: 'Paternal Grandfather', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'patGM', role: 'Paternal Grandmother', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'matGF', role: 'Maternal Grandfather', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'matGM', role: 'Maternal Grandmother', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'child1', role: 'Child', name: '', born: {}, status: 'unknown', placeholder: true },
  { id: 'child2', role: 'Child', name: '', born: {}, status: 'unknown', placeholder: true },
];

const POS = {
  patGF: [200, 120], patGM: [420, 120],
  matGF: [920, 120], matGM: [1140, 120],
  father: [310, 310],
  mother: [1030, 310],
  sib1: [470, 500], sib2: [670, 500],
  vishesh: [870, 500], niti: [1090, 500],
  child1: [880, 690], child2: [1080, 690],
};

const NW = 170, NH = 92;
const MO = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

let tx = 0, ty = 0, sc = 1;
const tg = document.getElementById('tg');
const svgEl = document.getElementById('tree-svg');

function applyT() { tg.setAttribute('transform', `translate(${tx},${ty}) scale(${sc})`); }

function doZoom(factor, mx, my) {
  const wrap = document.getElementById('wrap');
  const cx = mx ?? wrap.clientWidth / 2, cy = my ?? wrap.clientHeight / 2;
  const ns = Math.max(0.18, Math.min(4.5, sc * factor));
  tx = cx - (cx - tx) * (ns / sc);
  ty = cy - (cy - ty) * (ns / sc);
  sc = ns; applyT();
}

function resetView() {
  const w = document.getElementById('wrap');
  const vw = w.clientWidth, vh = w.clientHeight;
  const cx0 = 115, cy0 = 74, cw = 1110, ch = 662;
  const s = Math.min((vw - 56) / cw, (vh - 56) / ch, 1.05);
  sc = s;
  tx = (vw - cw * s) / 2 - cx0 * s;
  ty = (vh - ch * s) / 2 - cy0 * s;
  applyT();
}

function initials(p) {
  if (p.placeholder) return '+';
  return (p.name || '').split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase() || '?';
}

function drawConn() {
  const g = document.getElementById('conn');
  g.innerHTML = '';
  const hh = NH / 2;
  const LC = 'rgba(201,165,74,0.48)';
  const SC = 'rgba(205,158,52,0.82)';

  function coupleToChildren(aId, bId, kids) {
    const [ax, ay] = POS[aId], [bx] = POS[bId];
    const mx = (ax + bx) / 2;
    const dropY = ay + hh;
    const cc = kids.map(k => POS[k]);
    const minX = Math.min(...cc.map(c => c[0]));
    const maxX = Math.max(...cc.map(c => c[0]));
    const topY = cc[0][1] - hh;
    const barY = dropY + (topY - dropY) * 0.52;

    g.appendChild(el('line', {x1: ax, y1: ay, x2: bx, y2: ay, stroke: SC, 'stroke-width': '2.2'}));
    g.appendChild(el('circle', {cx: mx, cy: ay, r: '4.5', fill: 'none', stroke: SC, 'stroke-width': '1.8'}));
    g.appendChild(el('line', {x1: mx, y1: dropY, x2: mx, y2: barY, stroke: LC, 'stroke-width': '1.7'}));
    if (minX !== maxX)
      g.appendChild(el('line', {x1: minX, y1: barY, x2: maxX, y2: barY, stroke: LC, 'stroke-width': '1.7'}));
    for (const [cx, cy] of cc)
      g.appendChild(el('line', {x1: cx, y1: barY, x2: cx, y2: cy - hh, stroke: LC, 'stroke-width': '1.7'}));
  }

  coupleToChildren('patGF', 'patGM', ['father']);
  coupleToChildren('matGF', 'matGM', ['mother']);
  coupleToChildren('father', 'mother', ['sib1', 'sib2', 'vishesh']);
  coupleToChildren('vishesh', 'niti', ['child1', 'child2']);
}

function drawNodes() {
  const g = document.getElementById('nd');
  g.innerHTML = '';

  for (const p of PEOPLE) {
    const pos = POS[p.id]; if (!pos) continue;
    const [cx, cy] = pos, x = cx - NW / 2, y = cy - NH / 2;

    const grp = el('g', {'data-id': p.id});
    grp.style.cssText = 'cursor:pointer;transition:opacity .15s';

    const rect = el('rect', {x, y, width: NW, height: NH, rx: '11', ry: '11'});
    if (p.isRoot) {
      rect.setAttribute('fill', '#1C1208');
      rect.setAttribute('stroke', '#C9A84C');
      rect.setAttribute('stroke-width', '2.8');
      rect.setAttribute('filter', 'url(#glow)');
    } else if (p.placeholder) {
      rect.setAttribute('fill', 'rgba(255,255,255,0.027)');
      rect.setAttribute('stroke', 'rgba(201,165,74,0.38)');
      rect.setAttribute('stroke-width', '1.2');
      rect.setAttribute('stroke-dasharray', '7,5');
    } else {
      rect.setAttribute('fill', '#F7F3EC');
      rect.setAttribute('stroke', '#C9A84C');
      rect.setAttribute('stroke-width', '1.6');
      rect.setAttribute('filter', 'url(#shadow)');
    }
    grp.appendChild(rect);

    if (p.placeholder) {
      const plus = el('text', {x: cx, y: cy - 7, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': '22', 'font-family': 'Georgia,serif', fill: 'rgba(201,165,74,0.38)'});
      plus.textContent = '+';
      grp.appendChild(plus);
      const lbl = el('text', {x: cx, y: cy + 13, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': '11', 'font-family': 'EB Garamond,Georgia,serif', 'letter-spacing': '0.05em',
        fill: 'rgba(201,165,74,0.36)'});
      lbl.textContent = p.role;
      grp.appendChild(lbl);
    } else {
      const isRoot = p.isRoot;
      const nameCol = isRoot ? '#C9A84C' : '#2A1A0A';
      const dtCol = isRoot ? 'rgba(201,165,74,0.6)' : '#8A6440';

      grp.appendChild(el('circle', {cx, cy: y + 25, r: '16',
        fill: isRoot ? 'rgba(201,165,74,0.11)' : 'rgba(42,26,10,0.09)',
        stroke: isRoot ? 'rgba(201,165,74,0.42)' : 'rgba(42,26,10,0.17)', 'stroke-width': '1'}));
      const ini = el('text', {x: cx, y: y + 25, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': '12', 'font-weight': '600', 'font-family': 'Playfair Display,serif',
        fill: isRoot ? '#C9A84C' : '#5A3A1A'});
      ini.textContent = initials(p);
      grp.appendChild(ini);

      const parts = (p.name || '').split(' ');
      const ln1 = parts.slice(0, 2).join(' '), ln2 = parts.slice(2).join(' ');
      const twoLines = !!ln2;

      const t1 = el('text', {x: cx, y: twoLines ? y + 51 : y + 55, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': '13.5', 'font-weight': '600', 'font-family': 'Playfair Display,serif', fill: nameCol});
      t1.textContent = ln1; grp.appendChild(t1);
      if (twoLines) {
        const t2 = el('text', {x: cx, y: y + 65, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
          'font-size': '13.5', 'font-weight': '600', 'font-family': 'Playfair Display,serif', fill: nameCol});
        t2.textContent = ln2; grp.appendChild(t2);
      }

      if (p.born && p.born.y) {
        const place = (p.born.place || '').split(',')[0];
        const bstr = place ? `b. ${p.born.y} · ${place}` : `b. ${p.born.y}`;
        const bt = el('text', {x: cx, y: y + NH - 11, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
          'font-size': '10.5', 'font-family': 'EB Garamond,Georgia,serif', fill: dtCol});
        bt.textContent = bstr; grp.appendChild(bt);
      }
    }

    grp.addEventListener('mouseenter', () => grp.style.opacity = '0.82');
    grp.addEventListener('mouseleave', () => grp.style.opacity = '1');
    grp.addEventListener('click', () => openPanel(p.id));
    g.appendChild(grp);
  }
}

function openPanel(id) {
  const p = PEOPLE.find(x => x.id === id);
  const body = document.getElementById('pbody');
  const ini = initials(p);

  if (p.placeholder) {
    body.innerHTML = `
      <div class="p-avatar" style="color:rgba(201,165,74,0.38);border-color:rgba(201,165,74,0.18);">+</div>
      <div class="p-name" style="color:rgba(244,237,216,0.42)">${p.role}</div>
      <div class="p-role">Not yet added</div>
      <div class="p-hr"></div>
      <p class="p-note">This spot is reserved for Vishesh's ${p.role.toLowerCase()}.<br><br>Share details to fill this branch.</p>`;
  } else {
    const bd = p.born && p.born.y ? [p.born.d, MO[p.born.m], p.born.y].filter(Boolean).join(' ') : '—';
    const pl = (p.born && p.born.place) || '—';
    body.innerHTML = `
      <div class="p-avatar">${ini}</div>
      <div class="p-name">${p.name}</div>
      <div class="p-role">${p.role}${p.isRoot ? ' · Root' : ''}</div>
      <div class="p-hr"></div>
      <div class="p-row"><span class="p-lbl">Born</span><span class="p-val">${bd}</span></div>
      <div class="p-row"><span class="p-lbl">Place</span><span class="p-val">${pl}</span></div>
      <div class="p-row"><span class="p-lbl">Status</span><span class="p-val" style="text-transform:capitalize">${p.status}</span></div>`;
  }
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// Pan & zoom events (same as original)
let pan = false, px0 = 0, py0 = 0, tx0 = 0, ty0 = 0;
svgEl.addEventListener('mousedown', e => {
  if (e.target.closest('[data-id]')) return;
  pan = true; px0 = e.clientX; py0 = e.clientY; tx0 = tx; ty0 = ty;
  svgEl.classList.add('drag');
});
window.addEventListener('mousemove', e => {
  if (!pan) return;
  tx = tx0 + e.clientX - px0; ty = ty0 + e.clientY - py0; applyT();
});
window.addEventListener('mouseup', () => { pan = false; svgEl.classList.remove('drag'); });

svgEl.addEventListener('wheel', e => {
  e.preventDefault();
  const r = svgEl.getBoundingClientRect();
  doZoom(e.deltaY < 0 ? 1.1 : 0.91, e.clientX - r.left, e.clientY - r.top);
}, {passive: false});

// Touch support (same as original)
let t2d = 0, t1x = 0, t1y = 0, ttx = 0, tty = 0, tpan = false;
svgEl.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    tpan = true; t1x = e.touches[0].clientX; t1y = e.touches[0].clientY; ttx = tx; tty = ty;
  } else if (e.touches.length === 2) {
    tpan = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    t2d = Math.hypot(dx, dy);
  }
}, {passive: true});
svgEl.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && tpan) {
    tx = ttx + e.touches[0].clientX - t1x; ty = tty + e.touches[0].clientY - t1y; applyT();
  } else if (e.touches.length === 2 && t2d) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    doZoom(d / t2d); t2d = d;
  }
}, {passive: false});
svgEl.addEventListener('touchend', () => { tpan = false; t2d = 0; });

drawConn();
drawNodes();
window.addEventListener('load', resetView);
window.addEventListener('resize', resetView);
</script>
</body>
</html>

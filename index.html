<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breja Family Heritage</title>
  <style>
    /* ─── Reset & Base ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at 18% 8%, #1c1408, #0a0705 65%);
      font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
      color: #f6edd8;
      min-height: 100vh;
      padding: 50px 24px 80px;
    }

    /* ─── Header ─────────────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #d6b25e;
      text-shadow: 0 2px 18px rgba(214, 178, 94, 0.25);
    }

    .subtitle {
      font-size: 1.1rem;
      font-style: italic;
      color: rgba(246, 237, 216, 0.45);
      margin-top: 6px;
      letter-spacing: 0.06em;
    }

    .header-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(214, 178, 94, 0.55), transparent);
      margin: 18px auto 0;
    }

    /* ─── Tree container ─────────────────────────────────────────────────────────── */
    #tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ─── Generation row ─────────────────────────────────────────────────────────── */
    .row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
      margin: 0;
    }

    /* ─── Couple group (two people with heart) ───────────────────────────────────── */
    .couple {
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
    }

    .couple .card {
      flex-shrink: 0;
    }

    .couple .heart {
      color: #d6b25e;
      font-size: 1.4rem;
      opacity: 0.85;
      padding: 0 8px;
      flex-shrink: 0;
      position: relative;
      top: -2px;
    }

    /* ─── Couple with children ──────────────────────────────────────────────────── */
    .couple-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
    }

    .child-connector {
      width: 2px;
      height: 36px;
      margin: 4px auto;
      background: linear-gradient(
        to bottom,
        rgba(214, 178, 94, 0.55),
        rgba(214, 178, 94, 0.08)
      );
      border-radius: 1px;
      flex-shrink: 0;
    }

    .children {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      flex-wrap: wrap;
      width: 100%;
    }

    /* ─── Single person ──────────────────────────────────────────────────────────── */
    .single {
      display: flex;
    }

    .single .card {
      flex-shrink: 0;
    }

    /* ─── Connector between generations ──────────────────────────────────────────── */
    .connector {
      width: 2px;
      height: 52px;
      margin: 12px auto 12px;
      background: linear-gradient(
        to bottom,
        rgba(214, 178, 94, 0.55),
        rgba(214, 178, 94, 0.08)
      );
      border-radius: 1px;
    }

    /* ─── Individual card ────────────────────────────────────────────────────────── */
    .card {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(214, 178, 94, 0.22);
      border-radius: 18px;
      padding: 22px 16px 18px;
      width: 155px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 26px 60px rgba(0, 0, 0, 0.7);
      border-color: rgba(214, 178, 94, 0.45);
    }

    .card.deceased {
      opacity: 0.55;
      filter: grayscale(50%);
    }

    /* ─── Image wrapper ──────────────────────────────────────────────────────────── */
    .img-wrap {
      width: 84px;
      height: 84px;
      margin: 0 auto 14px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(214, 178, 94, 0.38);
      background: #1c1408;
      flex-shrink: 0;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ─── Typography ─────────────────────────────────────────────────────────────── */
    .card h3 {
      font-size: 0.88rem;
      font-weight: 600;
      color: #f6edd8;
      line-height: 1.35;
      margin-bottom: 5px;
    }

    .card .role {
      font-size: 0.76rem;
      font-style: italic;
      color: rgba(214, 178, 94, 0.72);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .card .meta {
      font-size: 0.7rem;
      color: rgba(214, 178, 94, 0.6);
      letter-spacing: 0.01em;
      font-style: normal;
    }

    /* ─── Loading / error states ─────────────────────────────────────────────────── */
    .loading, .error {
      text-align: center;
      font-style: italic;
      color: rgba(246, 237, 216, 0.45);
      margin-top: 60px;
      font-size: 1rem;
    }

    .error { color: #e07070; }

    /* ─── Responsive ─────────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { padding: 36px 12px 60px; }
      .row { gap: 24px; }
      .couple { gap: 0; }
    }

    @media (max-width: 520px) {
      body { padding: 30px 10px 50px; }
      
      header h1 { font-size: 1.6rem; }
      
      .card { 
        width: 130px; 
        padding: 16px 12px 12px; 
      }
      
      .img-wrap { 
        width: 72px; 
        height: 72px; 
        margin-bottom: 10px;
      }
      
      .card h3 { 
        font-size: 0.76rem; 
      }
      
      .card .role {
        font-size: 0.65rem;
        margin-bottom: 3px;
      }

      .card .meta {
        font-size: 0.65rem;
      }
      
      .row { 
        gap: 16px; 
      }
      
      .couple .heart { 
        font-size: 1rem;
        padding: 0 4px;
      }
      
      .connector {
        height: 40px;
        margin: 8px auto;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Breja Family Heritage</h1>
  <div class="header-line"></div>
  <p class="subtitle">Four Generations</p>
</header>

<div id="tree"></div>

<script src="script.js"></script>

</body>
</html>
